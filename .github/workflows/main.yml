on:
  push:
    branches:
      - main

name: Deploy website on push

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Listar conteúdo que será publicado
        run: |
          echo "Diretório atual:" && pwd
          echo "Arquivos na raiz:" && ls -la
          echo "Contagem (aprox.):" && find . -type f | head -50
          echo "Total de arquivos:" && find . -type f | wc -l

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: home2/autode51/auto.dev.br/andre/
          log-level: verbose
          # dry-run: true   # descomente só para teste: lista o que faria SEM enviar
          # dangerous-clean-slate: true  # cuidado: apaga tudo em server-dir antes
          # verbose: true  # mostra mais detalhes
